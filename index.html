<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RebateGain</title>
    <style>
      .app-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
      }
      .app-boot__logo {
        width: 35px;
        height: auto;
        animation: app-boot-pulse 1.4s ease-in-out infinite;
      }
      @keyframes app-boot-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-boot">
        <img class="app-boot__logo" src="/logo-s.png" alt="RebateGain" />
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
